    <meta name="twitter:image" content="https://shqiponja.app/eagle-logo-512.png" />

    <!-- PWA theming -->
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f0a1a" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" href="/eagle-logo.png" />
    <link rel="apple-touch-startup-image" href="/eagle-logo-512.png" />

    <!-- Resource hints: preconnect to eliminate DNS + TLS latency for critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="%VITE_SUPABASE_URL%" crossorigin />
    <link rel="dns-prefetch" href="%VITE_SUPABASE_URL%" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Fonts: Inter (UI text, critical) + Playfair Display (decorative, optional) -->
    <!-- Use display=swap so text renders in fallback font while the web font loads -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Inline critical CSS: prevent white flash, show branded loader while JS hydrates -->
    <style>
      /* ── Base reset to match the app shell ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background: #0b0810;
        color: #ebebeb;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
        height: 100%;
      }

      /* ── Root placeholder spinner (shows before React mounts) ── */
      #root:empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        gap: 16px;
        background: radial-gradient(ellipse at 60% 0%, rgba(200,30,60,0.12) 0%, transparent 60%),
                    #0b0810;
      }
      #root:empty::before {
        content: '';
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid rgba(232, 39, 75, 0.18);
        border-top-color: #e8274b;
        animation: _cspin 0.65s linear infinite;
      }
      #root:empty::after {
        content: 'Shqiponja';
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.35);
      }
      @keyframes _cspin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <a href="#root" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50 focus:bg-white focus:text-black focus:px-4 focus:py-2 focus:rounded">Skip to content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
