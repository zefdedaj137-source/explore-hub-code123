name: iOS Build & Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  build-ios:
    runs-on: macos-15   # Apple Silicon Mac runner (Xcode 16)
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 4. Build the React/Vite app ───────────────────────────────────────
      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_REVENUECAT_API_KEY: ${{ secrets.VITE_REVENUECAT_API_KEY }}

      # ── 5. Capacitor iOS setup ────────────────────────────────────────────
      - name: Add iOS platform (if not present)
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      # ── 6. Import Apple code-signing certificate ──────────────────────────
      - name: Set up signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Extract cert and key to files
        # Bypasses PKCS#12 entirely — import cert and key separately.
        # This avoids all KDF/MAC encoding issues since security import
        # accepts raw DER certs and PEM private keys directly.
        shell: python3 {0}
        env:
          DIST_CERT_PEM_BASE64: ${{ secrets.DIST_CERT_PEM_BASE64 }}
          DIST_KEY_PEM_BASE64: ${{ secrets.DIST_KEY_PEM_BASE64 }}
        run: |
          import base64, os, re, sys

          def raw_to_der(data, name):
              if data.lstrip()[:5] == b'-----':
                  m = re.search(rb'-----BEGIN [^-]+-----([^-]+)-----END', data, re.DOTALL)
                  b64 = re.sub(rb'\s', b'', m.group(1)) if m else \
                        b''.join(l for l in data.splitlines() if not l.startswith(b'-----'))
                  der = base64.b64decode(b64)
                  print(f'{name}: PEM->DER {len(der)}b first4={der[:4].hex()}')
                  return der
              elif data[:1] == b'\x30':
                  print(f'{name}: raw DER {len(data)}b first4={data[:4].hex()}')
                  return data
              else:
                  print(f'{name}: UNKNOWN first4={data[:4].hex()}', file=sys.stderr)
                  sys.exit(1)

          def to_pem(der, label):
              b64 = base64.b64encode(der).decode()
              lines = '\n'.join(b64[i:i+64] for i in range(0, len(b64), 64))
              return f'-----BEGIN {label}-----\n{lines}\n-----END {label}-----\n'

          t = os.environ['RUNNER_TEMP']
          cert_raw = base64.b64decode(os.environ['DIST_CERT_PEM_BASE64'])
          key_raw  = base64.b64decode(os.environ['DIST_KEY_PEM_BASE64'])

          cert_der = raw_to_der(cert_raw, 'cert')
          key_der  = raw_to_der(key_raw, 'key')

          open(t + '/cert.der', 'wb').write(cert_der)
          print(f'cert.der written: {len(cert_der)}b')

          # Also write as PEM (security import auto-detects PEM reliably; DER causes
          # 'Import/Export format unsupported' on macOS 15 without explicit -f flag)
          cert_pem_b64 = '\n'.join(
              base64.b64encode(cert_der[i:i+48]).decode()
              for i in range(0, len(cert_der), 48))
          cert_pem = f'-----BEGIN CERTIFICATE-----\n{cert_pem_b64}\n-----END CERTIFICATE-----\n'
          open(t + '/cert.pem', 'wb').write(cert_pem.encode())
          print(f'cert.pem written: {len(cert_pem)}b')

          if key_raw.lstrip()[:5] == b'-----':
              open(t + '/key.pem', 'wb').write(key_raw)
              label = re.search(rb'-----BEGIN ([^-]+)-----', key_raw).group(1).decode()
              print(f'key.pem: kept original PEM ({label})')
          else:
              # Assume PKCS#8 DER; wrap as PEM so security import auto-detects
              pem = to_pem(key_der, 'PRIVATE KEY').encode()
              open(t + '/key.pem', 'wb').write(pem)
              print(f'key.pem: wrote DER as PEM (PRIVATE KEY)')

      - name: Import certificate to keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          P12_PASS="tempcipass_$(openssl rand -hex 8)"

          # Bundle cert + key into a PKCS#12 — the only format security import
          # accepts reliably on macOS 15 without "Import/Export format unsupported"
          echo "=== Creating PKCS#12 ==="
          openssl pkcs12 -export \
            -in  $RUNNER_TEMP/cert.pem \
            -inkey $RUNNER_TEMP/key.pem \
            -out $RUNNER_TEMP/codesign.p12 \
            -passout "pass:$P12_PASS" \
            && echo "p12 created OK" \
            || { echo "p12 creation FAILED"; exit 1; }

          echo "=== Importing PKCS#12 to keychain ==="
          security import $RUNNER_TEMP/codesign.p12 \
            -k $KEYCHAIN_PATH \
            -P "$P12_PASS" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            && echo "p12 imported OK" \
            || { echo "p12 import FAILED"; exit 1; }

          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "=== Code-signing identities ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          echo "Certificate and key setup complete"

      # ── 6b. Install provisioning profile ─────────────────────────────────
      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          python3 -c "import base64,os; open(os.environ['RUNNER_TEMP']+'/build_pp.mobileprovision','wb').write(base64.b64decode(os.environ['BUILD_PROVISION_PROFILE_BASE64']))"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/build_pp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── 7. Build & archive the Xcode project ─────────────────────────────
      - name: Build Xcode archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            | xcpretty

      # ── 8. Export IPA ─────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          set -o pipefail
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa \
            | xcpretty

      # ── 9. Upload to App Store Connect ────────────────────────────────────
      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          python3 -c "import base64,os; open(os.path.expanduser('~/private_keys/AuthKey_')+os.environ['APP_STORE_CONNECT_KEY_ID']+'.p8','wb').write(base64.b64decode(os.environ['APP_STORE_CONNECT_KEY_BASE64']))"

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/App.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      # ── 10. Cleanup keychain ───────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
