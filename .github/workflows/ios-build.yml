name: iOS Build & Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  build-ios:
    runs-on: macos-15   # Apple Silicon Mac runner (Xcode 16)
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 4. Build the React/Vite app ───────────────────────────────────────
      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_REVENUECAT_API_KEY: ${{ secrets.VITE_REVENUECAT_API_KEY }}

      # ── 5. Capacitor iOS setup ────────────────────────────────────────────
      - name: Add iOS platform (if not present)
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      # ── 6. Import Apple code-signing certificate ──────────────────────────
      - name: Import code-signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/build_certificate.p12

          # Re-export with legacy SHA1-3DES encryption so macOS security can import it
          openssl pkcs12 -in $RUNNER_TEMP/build_certificate.p12 \
            -passin pass:"$P12_PASSWORD" \
            -out $RUNNER_TEMP/cert.pem \
            -passout pass:"$P12_PASSWORD" 2>/dev/null || \
          openssl pkcs12 -legacy -in $RUNNER_TEMP/build_certificate.p12 \
            -passin pass:"$P12_PASSWORD" \
            -out $RUNNER_TEMP/cert.pem \
            -passout pass:"$P12_PASSWORD"

          openssl pkcs12 -export \
            -in $RUNNER_TEMP/cert.pem \
            -passin pass:"$P12_PASSWORD" \
            -passout pass:"$P12_PASSWORD" \
            -keypbe PBE-SHA1-3DES -certpbe PBE-SHA1-3DES -nomac \
            -out $RUNNER_TEMP/build_certificate_legacy.p12

          security import $RUNNER_TEMP/build_certificate_legacy.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $RUNNER_TEMP/build_pp.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/build_pp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── 7. Build & archive the Xcode project ─────────────────────────────
      - name: Build Xcode archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            | xcpretty

      # ── 8. Export IPA ─────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa \
            | xcpretty

      # ── 9. Upload to App Store Connect ────────────────────────────────────
      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          echo -n "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode -o $RUNNER_TEMP/AuthKey.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/App.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --apiKey-path "$RUNNER_TEMP/AuthKey.p8"

      # ── 10. Cleanup keychain ───────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
