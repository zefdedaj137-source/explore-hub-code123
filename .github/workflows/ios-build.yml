name: iOS Build & Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  build-ios:
    runs-on: macos-15   # Apple Silicon Mac runner (Xcode 16)
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 4. Build the React/Vite app ───────────────────────────────────────
      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_REVENUECAT_API_KEY: ${{ secrets.VITE_REVENUECAT_API_KEY }}

      # ── 5. Capacitor iOS setup ────────────────────────────────────────────
      - name: Add iOS platform (if not present)
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      # ── 6. Import Apple code-signing certificate ──────────────────────────
      - name: Set up signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Create unencrypted P12 from PEM secrets
        # shell: python3 {0} writes the run: block to a temp .py file and
        # executes it — no heredoc needed, so no YAML indentation conflict.
        shell: python3 {0}
        env:
          DIST_CERT_PEM_BASE64: ${{ secrets.DIST_CERT_PEM_BASE64 }}
          DIST_KEY_PEM_BASE64: ${{ secrets.DIST_KEY_PEM_BASE64 }}
        run: |
          import subprocess, sys, base64, os

          # cryptography >= 42 added strict UTCTime ASN.1 validation that
          # rejects Apple Distribution certs with post-2049 expiry dates.
          # Pin to < 42 so the lenient parser is used.
          subprocess.check_call(
              [sys.executable, '-m', 'pip', 'install', '--quiet', 'cryptography<42']
          )

          # Flush any cached cryptography modules so the pinned version loads.
          for mod in list(sys.modules):
              if mod.startswith('cryptography'):
                  del sys.modules[mod]

          from cryptography.hazmat.primitives.serialization import (
              pkcs12, load_pem_private_key, NoEncryption
          )
          from cryptography import x509

          t        = os.environ['RUNNER_TEMP']
          cert_pem = base64.b64decode(os.environ['DIST_CERT_PEM_BASE64'])
          key_pem  = base64.b64decode(os.environ['DIST_KEY_PEM_BASE64'])

          cert = x509.load_pem_x509_certificate(cert_pem)
          key  = load_pem_private_key(key_pem, password=None)

          p12_data = pkcs12.serialize_key_and_certificates(
              name=b'', key=key, cert=cert, cas=None,
              encryption_algorithm=NoEncryption()
          )
          open(t + '/cert.p12', 'wb').write(p12_data)
          print('p12 created successfully')

      - name: Import certificate to keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security import $RUNNER_TEMP/cert.p12 -P "" -A -t agg -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "Certificate imported successfully"

      # ── 6b. Install provisioning profile ─────────────────────────────────
      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          python3 -c "import base64,os; open(os.environ['RUNNER_TEMP']+'/build_pp.mobileprovision','wb').write(base64.b64decode(os.environ['BUILD_PROVISION_PROFILE_BASE64']))"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/build_pp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── 7. Build & archive the Xcode project ─────────────────────────────
      - name: Build Xcode archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            | xcpretty

      # ── 8. Export IPA ─────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa \
            | xcpretty

      # ── 9. Upload to App Store Connect ────────────────────────────────────
      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          python3 -c "import base64,os; open(os.environ['RUNNER_TEMP']+'/AuthKey.p8','wb').write(base64.b64decode(os.environ['APP_STORE_CONNECT_KEY_BASE64']))"

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/App.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --apiKey-path "$RUNNER_TEMP/AuthKey.p8"

      # ── 10. Cleanup keychain ───────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
