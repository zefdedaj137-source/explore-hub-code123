name: iOS Build & Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  build-ios:
    runs-on: macos-15   # Apple Silicon
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1b. Select Xcode 26 ───────────────────────────────────────────────
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── 2. Node.js setup ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 4. Build the React/Vite app ───────────────────────────────────────
      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_REVENUECAT_API_KEY: ${{ secrets.VITE_REVENUECAT_API_KEY }}

      # ── 5. Capacitor iOS setup ────────────────────────────────────────────
      - name: Add iOS platform and sync
        run: |
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Patch iOS permissions in Info.plist
        run: |
          PLIST="ios/App/App/Info.plist"
          add_key() {
            /usr/libexec/PlistBuddy -c "Add :$1 string '$2'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :$1 '$2'" "$PLIST"
          }
          add_key NSMicrophoneUsageDescription "Shqiponja needs microphone access for voice messages and calls."
          add_key NSCameraUsageDescription "Shqiponja needs camera access for photos and video calls."
          add_key NSPhotoLibraryUsageDescription "Shqiponja needs photo library access to share photos."
          add_key NSPhotoLibraryAddUsageDescription "Shqiponja needs permission to save photos."
          add_key NSLocationWhenInUseUsageDescription "Shqiponja uses your location to show you nearby people."
          add_key NSLocationAlwaysAndWhenInUseUsageDescription "Shqiponja uses your location to show you nearby people."
          echo "Info.plist permission strings applied:"
          /usr/libexec/PlistBuddy -c "Print :NSMicrophoneUsageDescription" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$PLIST"

          # Register custom URL scheme so iOS can redirect OAuth back into the app.
          # This makes com.shqiponja.app://auth/callback work for Apple/Google Sign In.
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string com.shqiponja.app" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleURLTypes:0:CFBundleURLName com.shqiponja.app" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string com.shqiponja.app" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleURLTypes:0:CFBundleURLSchemes:0 com.shqiponja.app" "$PLIST"
          echo "URL scheme registered:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleURLTypes" "$PLIST"

      - name: Wire entitlements into Xcode project
        run: |
          python3 - <<'PYEOF'
          import re
          pbxproj = 'ios/App/App.xcodeproj/project.pbxproj'
          with open(pbxproj) as f:
              content = f.read()
          # Add CODE_SIGN_ENTITLEMENTS to both Debug and Release build settings
          content = re.sub(
              r'(PRODUCT_BUNDLE_IDENTIFIER = com\.shqiponja\.app;)',
              r'\1\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = App/App.entitlements;',
              content
          )
          with open(pbxproj, 'w') as f:
              f.write(content)
          print('Entitlements wired into project.pbxproj')
          PYEOF

      - name: Configure Xcode project signing
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          python3 - <<'PYEOF'
          import re, os
          pbxproj = 'ios/App/App.xcodeproj/project.pbxproj'
          team    = os.environ['DEVELOPMENT_TEAM'].strip()
          profile = os.environ['PROVISIONING_PROFILE_NAME'].strip()
          with open(pbxproj) as f:
              content = f.read()
          # Inject manual signing into the App native target build configurations.
          # SPM package targets are NOT listed in the pbxproj, so this only
          # affects the App target — avoiding the RevenueCat provisioning error.
          content = content.replace(
              'CODE_SIGN_STYLE = Automatic;',
              ('CODE_SIGN_IDENTITY = "iPhone Distribution";\n'
               '\t\t\t\tCODE_SIGN_STYLE = Manual;\n'
               f'\t\t\t\tDEVELOPMENT_TEAM = "{team}";\n'
               f'\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{profile}";')
          )
          content = re.sub(r'DEVELOPMENT_TEAM = "";', f'DEVELOPMENT_TEAM = "{team}";', content)
          with open(pbxproj, 'w') as f:
              f.write(content)
          print(f'Signing configured: team={team!r}, profile={profile!r}')
          PYEOF

      # ── 6. Import Apple code-signing certificate ──────────────────────────
      - name: Set up signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Import code-signing certificate
        # Requires secret DIST_P12_BASE64  (base64 of a .p12 exported from Keychain Access)
        # and secret DIST_P12_PASSWORD (the password you chose when exporting).
        # To create these secrets:
        #   1. Revoke the old cert at developer.apple.com/account/resources/certificates
        #   2. Create a new Apple Distribution cert, import to Keychain Access
        #   3. Keychain Access → right-click the cert → Export → save as .p12
        #   4. base64 -i distribution.p12 | tr -d '\n'  → use as DIST_P12_BASE64
        #   5. The password you set → use as DIST_P12_PASSWORD
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          DIST_P12_BASE64:   ${{ secrets.DIST_P12_BASE64 }}
          DIST_P12_PASSWORD: ${{ secrets.DIST_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$DIST_P12_BASE64" | base64 --decode > $RUNNER_TEMP/codesign.p12
          echo "=== Importing PKCS#12 to keychain ==="
          security import $RUNNER_TEMP/codesign.p12 \
            -k $KEYCHAIN_PATH \
            -P "$DIST_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            && echo "p12 imported OK" \
            || { echo "p12 import FAILED"; exit 1; }
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "=== Code-signing identities ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          echo "Certificate and key setup complete"

      # ── 6b. Install provisioning profile ─────────────────────────────────
      - name: Set build number
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist
          echo "Build number set to $BUILD_NUMBER"

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          python3 -c "import base64,os; open(os.environ['RUNNER_TEMP']+'/build_pp.mobileprovision','wb').write(base64.b64decode(os.environ['BUILD_PROVISION_PROFILE_BASE64']))"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/build_pp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── 7. Build & archive the Xcode project ─────────────────────────────
      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Build Xcode archive
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/App.xcarchive

      # ── 8. Export IPA ─────────────────────────────────────────────────────
      - name: Export IPA
        env:
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.shqiponja.app</key>
              <string>$(echo "$PROVISIONING_PROFILE_NAME" | tr -d '\n\r')</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      # ── 9. Upload to App Store Connect ────────────────────────────────────
      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          # Decode the .p8 API key
          mkdir -p ~/private_keys
          python3 -c "
          import base64, os
          key = base64.b64decode(os.environ['APP_STORE_CONNECT_KEY_BASE64'])
          path = os.path.expanduser('~/private_keys/AuthKey_' + os.environ['APP_STORE_CONNECT_KEY_ID'] + '.p8')
          open(path, 'wb').write(key)
          print('API key written to', path)
          "

          IPA_PATH=$(find $RUNNER_TEMP/ipa -name "*.ipa" | head -1)
          echo "Uploading: $IPA_PATH"

          # xcrun altool is deprecated in Xcode 15+ — use xcrun altool for App Store
          # uploads (still works) OR fall back to xcrun notarytool for notarization.
          # For App Store Connect submissions, altool --upload-app is still the correct tool.
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey  "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose \
          || {
            echo "altool failed — trying xcrun notarytool submit as fallback"
            xcrun notarytool submit "$IPA_PATH" \
              --key ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
              --key-id "$APP_STORE_CONNECT_KEY_ID" \
              --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
              --wait
          }

      # ── 10. Cleanup keychain ───────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
