name: iOS Build & Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  build-ios:
    runs-on: macos-15   # Apple Silicon Mac runner (Xcode 16)
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 4. Build the React/Vite app ───────────────────────────────────────
      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_REVENUECAT_API_KEY: ${{ secrets.VITE_REVENUECAT_API_KEY }}

      # ── 5. Capacitor iOS setup ────────────────────────────────────────────
      - name: Add iOS platform (if not present)
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      # ── 6. Import Apple code-signing certificate ──────────────────────────
      - name: Set up signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Create unencrypted P12 from PEM secrets
        # Builds a RFC-7292-conformant PKCS#12 in pure Python stdlib:
        #   - cert DER treated as opaque bytes (never parsed — bypasses all
        #     strict ASN.1 libraries that reject this Apple cert)
        #   - cert and key in separate ContentInfo (matches Keychain export)
        #   - macData omitted (OPTIONAL per RFC 7292 §4; Security.framework
        #     accepts MAC-less PKCS#12)
        shell: python3 {0}
        env:
          DIST_CERT_PEM_BASE64: ${{ secrets.DIST_CERT_PEM_BASE64 }}
          DIST_KEY_PEM_BASE64: ${{ secrets.DIST_KEY_PEM_BASE64 }}
        run: |
          import base64, os

          # ── DER primitives ───────────────────────────────────────────────
          def _l(n):
              if n < 0x80: return bytes([n])
              elif n < 0x100: return bytes([0x81, n])
              else: return bytes([0x82, n >> 8, n & 0xff])
          def seq(b):  return b'\x30' + _l(len(b)) + b
          def ostr(b): return b'\x04' + _l(len(b)) + b
          def t0(b):   return b'\xa0' + _l(len(b)) + b
          def oid(h):  v = bytes.fromhex(h); return b'\x06' + _l(len(v)) + v

          OID_DATA    = '2a864886f70d010701'
          OID_CERTBAG = '2a864886f70d010c0a0103'
          OID_X509    = '2a864886f70d01091601'
          OID_KEYBAG  = '2a864886f70d010c0a0101'
          OID_RSA     = '2a864886f70d010101'

          t        = os.environ['RUNNER_TEMP']
          cert_pem = base64.b64decode(os.environ['DIST_CERT_PEM_BASE64'])
          key_pem  = base64.b64decode(os.environ['DIST_KEY_PEM_BASE64'])

          # Strip PEM headers → raw DER (no ASN.1 parsing of the cert at all)
          def pem_to_der(p):
              lines = p.decode('ascii', errors='replace').splitlines()
              return base64.b64decode(''.join(l for l in lines if not l.startswith('-----')))

          cert_der = pem_to_der(cert_pem)
          key_der  = pem_to_der(key_pem)

          # Wrap PKCS#1 RSA key in PKCS#8 PrivateKeyInfo if needed
          if b'BEGIN PRIVATE KEY' not in key_pem:
              key_der = seq(b'\x02\x01\x00' + seq(oid(OID_RSA) + b'\x05\x00') + ostr(key_der))

          # SafeBags — no bagAttributes (OPTIONAL per RFC 7292, omit)
          cert_bag      = seq(oid(OID_X509) + t0(ostr(cert_der)))
          cert_safe_bag = seq(oid(OID_CERTBAG) + t0(cert_bag))
          key_safe_bag  = seq(oid(OID_KEYBAG)  + t0(key_der))

          # Cert and key in SEPARATE ContentInfo within AuthenticatedSafe,
          # matching Apple Keychain export layout
          cert_ci   = seq(oid(OID_DATA) + t0(ostr(seq(cert_safe_bag))))
          key_ci    = seq(oid(OID_DATA) + t0(ostr(seq(key_safe_bag))))
          auth_safe = seq(cert_ci + key_ci)   # AuthenticatedSafe = SEQ OF ContentInfo

          # Outer PFX ContentInfo wrapping AuthenticatedSafe
          outer_ci = seq(oid(OID_DATA) + t0(ostr(auth_safe)))

          # PFX with no macData (macData is OPTIONAL per RFC 7292 §4)
          pfx = seq(b'\x02\x01\x03' + outer_ci)
          open(t + '/cert.p12', 'wb').write(pfx)
          print(f'p12 written ({len(pfx)} bytes, no MAC)')

      - name: Import certificate to keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security import $RUNNER_TEMP/cert.p12 -P "" -A -t agg -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "Certificate imported successfully"

      # ── 6b. Install provisioning profile ─────────────────────────────────
      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          python3 -c "import base64,os; open(os.environ['RUNNER_TEMP']+'/build_pp.mobileprovision','wb').write(base64.b64decode(os.environ['BUILD_PROVISION_PROFILE_BASE64']))"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/build_pp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── 7. Build & archive the Xcode project ─────────────────────────────
      - name: Build Xcode archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            | xcpretty

      # ── 8. Export IPA ─────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa \
            | xcpretty

      # ── 9. Upload to App Store Connect ────────────────────────────────────
      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          python3 -c "import base64,os; open(os.environ['RUNNER_TEMP']+'/AuthKey.p8','wb').write(base64.b64decode(os.environ['APP_STORE_CONNECT_KEY_BASE64']))"

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/App.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --apiKey-path "$RUNNER_TEMP/AuthKey.p8"

      # ── 10. Cleanup keychain ───────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
