name: iOS Build & Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

jobs:
  build-ios:
    runs-on: macos-15   # Apple Silicon Mac runner (Xcode 16)
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 4. Build the React/Vite app ───────────────────────────────────────
      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_REVENUECAT_API_KEY: ${{ secrets.VITE_REVENUECAT_API_KEY }}

      # ── 5. Capacitor iOS setup ────────────────────────────────────────────
      - name: Add iOS platform (if not present)
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      # ── 6. Import Apple code-signing certificate ──────────────────────────
      - name: Set up signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Import cert via ctypes + key via security import
        # All CLI tools (security add-certificates, security import cert.der/pem) call
        # SecCertificateCreateFromData which rejects this cert's non-standard ASN.1.
        # Solution: call SecCertificateCreateWithData + SecCertificateAddToKeychain
        # directly via ctypes — the lowest-level Apple API, no CLI wrapper involved.
        shell: python3 {0}
        env:
          DIST_CERT_PEM_BASE64: ${{ secrets.DIST_CERT_PEM_BASE64 }}
          DIST_KEY_PEM_BASE64: ${{ secrets.DIST_KEY_PEM_BASE64 }}
        run: |
          import base64, ctypes, os, re, sys

          CF  = ctypes.CDLL('/System/Library/Frameworks/CoreFoundation.framework/CoreFoundation')
          Sec = ctypes.CDLL('/System/Library/Frameworks/Security.framework/Security')

          CF.CFDataCreate.restype                      = ctypes.c_void_p
          CF.CFDataCreate.argtypes                     = [ctypes.c_void_p, ctypes.c_char_p, ctypes.c_long]
          CF.CFRelease.argtypes                        = [ctypes.c_void_p]
          Sec.SecCertificateCreateWithData.restype     = ctypes.c_void_p
          Sec.SecCertificateCreateWithData.argtypes    = [ctypes.c_void_p, ctypes.c_void_p]
          Sec.SecKeychainOpen.restype                  = ctypes.c_int32
          Sec.SecKeychainOpen.argtypes                 = [ctypes.c_char_p, ctypes.POINTER(ctypes.c_void_p)]
          Sec.SecCertificateAddToKeychain.restype      = ctypes.c_int32
          Sec.SecCertificateAddToKeychain.argtypes     = [ctypes.c_void_p, ctypes.c_void_p]

          def pem_body(data):
              m = re.search(rb'-----BEGIN [^-]+-----\r?\n?(.*?)\r?\n?-----END',
                            data, re.DOTALL)
              return base64.b64decode(re.sub(rb'[\r\n\s]', b'', m.group(1))) if m else data

          t        = os.environ['RUNNER_TEMP']
          cert_raw = base64.b64decode(os.environ['DIST_CERT_PEM_BASE64'])
          key_raw  = base64.b64decode(os.environ['DIST_KEY_PEM_BASE64'])

          cert_der = pem_body(cert_raw)
          print(f'cert_raw: {len(cert_raw)}b  is_pem={cert_raw.lstrip()[:5]}')
          print(f'cert_der: {len(cert_der)}b  first16={cert_der[:16].hex()}', flush=True)

          # Write key PEM for the bash step below
          open(t + '/key.pem', 'wb').write(key_raw)

          # Open the signing keychain
          kc = ctypes.c_void_p()
          st = Sec.SecKeychainOpen((t + '/app-signing.keychain-db').encode(), ctypes.byref(kc))
          assert st == 0, f'SecKeychainOpen failed: {st}'
          print(f'SecKeychainOpen OK (kc={kc.value:#x})', flush=True)

          # Create SecCertificateRef from raw DER bytes
          data_ref = CF.CFDataCreate(None, cert_der, len(cert_der))
          assert data_ref, 'CFDataCreate failed'
          cert_ref = Sec.SecCertificateCreateWithData(None, data_ref)
          CF.CFRelease(data_ref)

          if not cert_ref:
              print('FATAL: SecCertificateCreateWithData returned NULL', file=sys.stderr)
              print('cert_der first 128 bytes:', cert_der[:128].hex(), file=sys.stderr)
              CF.CFRelease(kc)
              sys.exit(1)
          print(f'SecCertificateCreateWithData OK (cert={cert_ref:#x})', flush=True)

          # Add certificate to the keychain
          st = Sec.SecCertificateAddToKeychain(cert_ref, kc)
          CF.CFRelease(cert_ref)
          CF.CFRelease(kc)
          # errSecDuplicateItem (-25299) is fine
          if st not in (0, -25299):
              print(f'FATAL: SecCertificateAddToKeychain failed: {st}', file=sys.stderr)
              sys.exit(1)
          print(f'Certificate added to keychain (status={st})', flush=True)

      - name: Import private key to keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "=== Importing private key to keychain ==="
          security import $RUNNER_TEMP/key.pem \
            -k $KEYCHAIN_PATH \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            && echo "key imported OK" \
            || { echo "key import FAILED"; exit 1; }
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "=== Code-signing identities ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          echo "Certificate and key setup complete"

      # ── 6b. Install provisioning profile ─────────────────────────────────
      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          python3 -c "import base64,os; open(os.environ['RUNNER_TEMP']+'/build_pp.mobileprovision','wb').write(base64.b64decode(os.environ['BUILD_PROVISION_PROFILE_BASE64']))"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/build_pp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── 7. Build & archive the Xcode project ─────────────────────────────
      - name: Build Xcode archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            | xcpretty

      # ── 8. Export IPA ─────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          set -o pipefail
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa \
            | xcpretty

      # ── 9. Upload to App Store Connect ────────────────────────────────────
      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          python3 -c "import base64,os; open(os.path.expanduser('~/private_keys/AuthKey_')+os.environ['APP_STORE_CONNECT_KEY_ID']+'.p8','wb').write(base64.b64decode(os.environ['APP_STORE_CONNECT_KEY_BASE64']))"

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/App.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      # ── 10. Cleanup keychain ───────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
